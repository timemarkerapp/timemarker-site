<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #f8fafc;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0b2f6a 0%, #42275a 45%, #633b91 100%);
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      backdrop-filter: blur(7px);
      background: rgba(11, 17, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.85rem, 4vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 700px;
      font-size: clamp(1rem, 2.2vw, 1.15rem);
      color: #d3db89;
      line-height: 1.6;
    }

    .form-wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.92rem;
      color: #dee6ff;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }

    input, select {
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, select:focus {
      border-color: #8aabff;
      box-shadow: 0 0 0 3px rgba(138, 171, 255, 0.25);
    }

    select option {
      color: #0f152e;
    }

    button {
      background: linear-gradient(135deg, #6984ff 0%, #8a4fe8 100%);
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
      padding: 13px 14px;
      transition: transform 0.05s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.94;
    }

    button:active {
      transform: translateY(1px);
    }

    .hint {
      font-size: 0.85rem;
      color: #b3c0e2;
      margin-top: 4px;
    }

    .success {
      display: none;
      text-align: center;
      padding: 20px 16px;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.40);
      border-radius: 12px;
      color: #c8fadd;
      font-weight: 600;
    }

    .error {
      display: none;
      color: #ffb4b4;
      font-size: 0.88rem;
      margin-top: -6px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
        border-radius: 16px;
      }

      .hero {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">
        Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.
      </p>
    </section>

    <section class="form-wrap">
      <form id="waitlistForm" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Jane Doe" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" selected disabled>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>

        <div id="error" class="error">Something went wrong. Please try again.</div>
        <button type="submit" id="submitBtn">Join Early Access</button>
        <p class="hint">We'll notify you when spots open.</p>
      </form>

      <div id="success" style="display:none" class="success">
        You're on the waitlist!
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const successEl = document.getElementById('success');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      if (!form.reportValidity()) {
        return;
      }

      const payload = {
        full_name: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        role: document.getElementById('role').value,
        source: 'TikTok'
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining...';

      try {
        const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qq1mex27fkhn66', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Request failed');
        }

        form.style.display = 'none';
        successEl.style.display = 'block';
      } catch (err) {
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
