<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102a;
      --bg2: #1a1340;
      --accent1: #635aff;
      --accent2: #ae67ff;
      --text: #eef2ff;
      --muted: #b6c0e2;
      --card: rgba(20, 24, 56, 0.65);
      --border: rgba(170, 135, 255, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 10% 0%, rgba(111, 89, 255, 0.25) 0%, transparent 60%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, #141b4d 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      backdrop-filter: blur(8px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(6, 8, 24, 0.45);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: #cbd3ff;
    }

    input, select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(160, 130, 255, 0.35);
      background: rgba(15, 19, 46, 0.85);
      color: #f5f7ff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #92a0d0;
    }

    input:focus, select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(174, 103, 255, 0.25);
    }

    .btn {
      margin-top: 4px;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      box-shadow: 0 10px 25px rgba(99, 90, 255, 0.35);
      transition: transform 0.06s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #ffccd2;
      min-height: 20px;
    }

    .success {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px solid rgba(111, 227, 158, 0.5);
      background: rgba(20, 93, 60, 0.35);
      border-radius: 12px;
      color: #c7ffdd;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px 18px;
        border-radius: 16px;
      }

      .subtitle {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>

      <form id="waitlistForm" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="John Doe" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <button class="btn" type="submit" id="submitBtn">Join Early Access</button>
        <div class="message" id="formMessage" aria-live="polite"></div>
      </form>

      <div class="success" id="successMessage">You're on the waitlist!</div>
    </section>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const submitBtn = document.getElementById('submitBtn');
    const formMessage = document.getElementById('formMessage');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formMessage.textContent = '';

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;

      if (!fullName || !email || !role) {
        formMessage.textContent = 'Please complete all fields.';
        return;
      }

      const payload = {
        full_name: fullName,
        email: email,
        role: role,
        source: 'TikTok'
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qq1mex27fkhh66', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Submission failed');
        }

        form.style.display = 'none';
        successMessage.style.display = 'block';
      } catch (error) {
        formMessage.textContent = 'Something went wrong. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
