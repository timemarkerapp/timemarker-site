<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102a;
      --bg2: #151940;
      --bg3: #2b1a5a;
      --card: rgba(15, 21, 52, 0.65);
      --text: #eef2ff;
      --muted: #b4bee4;
      --accent: #8b5cff;
      --accent2: #c575ff;
      --border: rgba(191, 173, 255, 0.25);
      -inputBg: rgba(11, 16, 42, 0.65);
      --success: #69eac9;
    }

    * {box-sizing: border-box;}

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    body {
      background: radial-gradient(1200px 600px at 10% 10%, rgba(139, 92, 246, 0.35), transparent 60%),
        radial-gradient(1000px 500px at 90% 90%, rgba(85, 102, 255, 0.28), transparent 60%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(3, 6, 20, 0.45);
      overflow: hidden;
    }

    .content {
      display: grid;
      grid-template-columns: 1.1 fr 0.9 fr;
      min-height: 560px;
    }

    .left,
    .right {
      padding: 48px 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(197, 117, 255, 0.16);
      border: 1px solid rgba(197, 117, 255, 0.35);
      color: #e2d3ff;
      font-size: 13px;
      letter-spacing: 0.2px;
    }

    h1 {
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1.1;
      margin: 20px 0 16px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      max-width: 550chp;
      margin: 0;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, rgba(13, 19, 47, 0.58), rgba(19, 26, 61, 0.35));
      border-left: 1px solid var(--border);
    }

    .form-card {
      width: 100%;
      max-width: 360px;
    }

    .form-title {
      font-size: 22px;
      margin: 0 0 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #d7dfff;
      margin-bottom: 7px;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
      font-family: inherit;
    }

    input, select {
      background: var(--inputBg);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::focus, select:focus {
      border-color: rgba(139, 92, 246, 0.9);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }

    select option {
      color: #0b102a;
    }

    .submit-btn {
      margin-top: 6px;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.08s ease, filter 0.2s ease;
    }

    .submit-btn:hover {filter: brightness(1.08);}
    .submit-btn:active {transform: translateY(1px);}

    .footnote {
      margin-top: 10px;
      font-size: 12px;
      color: #9fabd0;
    }

    .success {
      display: none;
      margin-top: 8px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(105, 234, 201, 0.14);
      border: 1px solid rgba(105, 234, 201, 0.45);
      color: var(--success);
      font-weight: 600;
    }

    .error {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: #ffb4b4;
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr ;
      }
      .right {
        border-left: none;
        border-top: 1px solid var(--border);
      }
      .eft, .right {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="content">
      <section class="left">
        <span class="badge">⚡ Early Access</span>
        <h1>Talk to an expert in 5 minutes</h1>
        <p class="subtitle">
          Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.
        </p>
      </section>

      <section class="right">
        <div class="form-card">
          <h3 class="form-title">Join the Waitlist</h3>
          <form id="waitlistForm" novalidate>
            <div class="field">
              <label for="fullName">Full Name</label>
              <input id="fullName" name="fullName" type="text" autocomplete="name" required />
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <div class="field">
              <label for="role">Role</label>
              <select id="role" name="role" required>
                <option value="" disabled selected>Select your role</option>
                <option value="Client">Client</option>
                <option value="Expert">Expert</option>
              </select>
            </div>

            <button id="submitBtn" class="submit-btn" type="submit">Join Early Access</button>
            <div class="footnote">No spam. Just early updates.</div>
            <div id="error" class="error">Something went wrong. Please try again.</div>
          </form>
          <div id="success" class="success">You're on the waitlist!</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('waitlistForm');
      const success = document.getElementById('success');
      const error = document.getElementById('error');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        error.style.display = 'none';

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const role = document.getElementById('role').value;

        if (!fullName || !email || !role) {
          error.textContent = 'Please fill out all fields.';
          error.style.display = 'block';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const payload = {
          full_name: fullName,
          email: email,
          role: role,
          source: 'TikTok'
        };

        try {
          const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error('Request failed');
          }

          form.style.display = 'none';
          success.style.display = 'block';
        } catch (err) {
          error.textContent = 'Something went wrong. Please try again.';
          error.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
        }
      });
    })();
  </script>
</body>
</html>
