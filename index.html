<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market - Early Access</title>
  <style>
    :root {
      --bg1: #0b102b;
      --bg2: #1a1442;
      --bg3: #3b1f72;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #ebefff;
      --muted: #bfc7ff;
      --accent: #8b5cf6;
      --accent2: #b370ff;
    }

    * {box-sizing: border-box;}

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      min-height: 100%;
    }

    body {
      background: radial-gradient(1200px 600px at 10% -10%, rgba(139, 92, 246, 0.35), #00000000),
                  radial-gradient(1000px 600px at 90% 110%, rgba(179, 112, 255, 0.28), #00000000),
                  linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1.18fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .hero, .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }

    .hero {
      padding: 40px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-size: 14px;
      font-weight: 650;
      color: #d9ddff;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.1;
      margin: 0 0 16px 0;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      line-height: 1.6;
      color: var(--muted);
      margin: 0;
      max-width: 55ch;
    }

    .card {
      padding: 28px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: #d2d8ff;
    }

    input, select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(15, 17, 40, 0.8);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2ease, box-shadow 0.2ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }

    .btn {
      margin-top: 4px;
      padding: 13px 16px;
      border: 0;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
      transition: transform 0.12ease, opacity 0.2ease;
    }

    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: 0.65; cursor: not-allowed; }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
      color: #cfd4ff;
    }

    .success {
      display: none;
      padding: 16px 14px;
      border-radius: 12px;
      background: rgba(138, 249, 171, 0.16);
      border: 1px solid rgba(138, 249, 171, 0.45);
      color: #d9ffe6;
      font-weight: 600;
      text-align: center;
    }

    @media (max-width: 880px) {
      .wrap {
        grid-template-columns: 1fr ;
      }
      .hero {
        padding: 32px 24px;
      }
      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="brand">Time Market</div>
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="card">
      <form id="waitlistForm" novalidate>
        <div class="field">
          <label for="full_name">Full Name</label>
          <input id="full_name" name="full_name" type="text" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" selected disabled>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>

        <button class="btn" id="submitBtn" type="submit">Join Early Access</button>
        <div class="msg" id="formMsg" aria-live="polite"></div>
      </form>
      <div class="success" id="successMsg">You're on the waitlist!</div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById('waitlistForm');
      const submitBtn = document.getElementById('submitBtn');
      const msg = document.getElementById('formMsg');
      const success = document.getElementById('successMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';

        if (!form.reportValidity()) {
          return;
        }

        const fullName = document.getElementById('full_name').value.trim();
        const email = document.getElementById('email').value.trim();
        const role = document.getElementById('role').value;

        const payload = {
          full_name: fullName,
          email: email,
          role: role,
          source: 'TikTok'
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const res = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            throw new Error('Request failed');
          }

          form.style.display = 'none';
          success.style.display = 'block';
        } catch (err) {
          msg.textContent = 'Something went wrong. Please try again.';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
        }
      });
    })();
  </script>
</body>
</html>
