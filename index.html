<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102a;
      --bg2: #1a114f;
      --bg3: #3d1c6b;
      --card: rgba(25, 24, 60, 0.75);
      --text: #eef0ff;
      --muted: #b7bce4;
      --accent: #8b5cff;
      --accent2: #c381ff;
      --border: rgba(148, 163, 255, 0.25);
      --error: #ff7b93;
    }

    * {box-sizing: border-box;}

    body {
      margin: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(195, 129, 255, 0.25), #0000),
                radial-gradient(1000px 600px at 90% 110%, rgba(139, 92, 255, 0.25), #0000),
                linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1.2 fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 255, 0.18);
      border: 1px solid rgba(195, 129, 255, 0.35);
      color: #d9c4ff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.15;
      margin: 0 0 14px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 18px);
      line-height: 1.6;
      margin: 0;
    }

    .form-wrap {
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: #cfd4ff;
    }

    input,
    select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid rgba(166, 176, 255, 0.35);
      background: rgba(10, 11, 32, 0.8);
      color: var(--text);
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {color: #8f96c1;}

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(139, 92, 255, 0.2);
    }

    button {
      margin-top: 6px;
      padding: 13px 14px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 25px rgba(148, 99, 255, 0.35);
      transition: transform 0.2, opacity 0.2;
    }

    button:hover { transform: translateY(-1px);}
    button:disabled {opacity: 0.75; cursor: not-allowed; transform: none;}

    .message {
      min-height: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .message.error {color: var(--error);}

    .success {
      display: none;
      padding: 20px 16px;
      border-radius: 12px;
      text-align: center;
      background: rgba(114, 86, 255, 0.18);
      border: 1px solid rgba(175, 154, 255, 0.45);
      font-size: 20px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        max-width: 540px;
      }
      .hero, .form-wrap {padding: 28px;}
    }

    @media (max-width: 480px) {
      body {padding: 14px;}
      .hero, .form-wrap {padding: 22px;}
      .form-title {font-size: 19px;}
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel hero">
      <span class="badge">Time Market – Early Access</span>
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="panel form-wrap">
      <h2 class="form-title">Join the waitlist</h2>
      <form id="waitlistForm" class="form" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="your name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="your@email.com" required />
        </div>
        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <button type="submit" id="submitBtn">Join Early Access</button>
        <div id="formMessage" class="message" aria-live="polite"></div>
      </form>
      <div id="successMessage" class="success">You're on the waitlist!</div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById('waitlistForm');
      const submitBtn = document.getElementById('submitBtn');
      const message = document.getElementById('formMessage');
      const success = document.getElementById('successMessage');

      function setMessage(text, isError) {
        message.textContent = text || '';
        message.classList.toggle('error', !!isError);
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        setMessage('');

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const role = document.getElementById('role').value;

        if (!fullName || !email || !role) {
          setMessage('Please complete all fields.', true);
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              full_name: fullName,
              email: email,
              role: role,
              source: 'TikTok'
            })
          });

          if (!response.ok) {
            throw new Error('Request failed');
          }

          form.style.display = 'none';
          success.style.display = 'block';
        } catch (err) {
          setMessage('Something went wrong. Please try again.', true);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
        }
      });
    })();
  </script>
</body>
</html>
