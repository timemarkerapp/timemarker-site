<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102d;
      --bg2: #24194d;
      --bg3: #4e2b8c;
      --card: rgba(15, 18, 51, 0.65);
      --border: rgba(255, 255, 255, 0.15);
      --text: #f5f7ff;
      --muted: #c3c9ff;
      --accent: #8675ff;
      --accent2: #b48fff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, System-UI. -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% 10%, #7155ff 2%, transparent 40%),
                    radial-gradient(1000px 500px at 90% 90%, #3bd5ff 0%, transparent 45%),
                    linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .hero {
      margin-bottom: 32px;
    }

    .kicker {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(180, 143, 255, 0.45);
      background: rgba(134, 117, 255, 0.18);
      color: #e8e4ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 1.6;
      color: var(--muted);
      max-width: 740px;
    }

    .form-card {
      margin-top: 24px;
      display: grid;
      gap: 14px;
      max-width: 520px;
    }

    .label {
      font-size: 13px;
      color: #ded9ff;
      margin-bottom: 6px;
      display: block;
      font-weight: 600;
    }

    .input,
    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 117, 255, 0.25);
    }

    button {
      margin-top: 4px;
      border: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #0e132f;
      font-weight: 800;
      font-size: 16px;
      padding: 13px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.06s ease, filter 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 600;
      display: none;
    }

    .message.success {
      display: none;
      background: rgba(72, 250, 185, 0.15);
      border: 1px solid rgba(113, 255, 207, 0.45);
      color: #beffeb;
    }

    .message.error {
      background: rgba(255, 117, 117, 0.15);
      border: 1px solid rgba(255, 158, 158, 0.45);
      color: #fff2;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }
      .container {
        padding: 28px 20px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <span class="kicker">Time Market</span>
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <form id="waitlistForm" class="form-card" novalidate>
      <div>
        <label class="label" for="fullName">Full Name</label>
        <input class="input" id="fullName" name="fullName" type="text" required placeholder="Enter your full name" />
      </div>

      <div>
        <label class="label" for="email">Email</label>
        <input class="input" id="email" name="email" type="email" required placeholder="you@example.com" />
      </div>

      <div>
        <label class="label" for="role">Role</label>
        <select id="role" name="role" required>
          <option value="" disabled selected>Select your role</option>
          <option value="Client">Client</option>
          <option value="Expert">Expert</option>
        </select>
      </div>

      <button type="submit" id="submitBtn">Join Early Access</button>
      <div id="errorMsg" class="message error" role="alert"></div>
    </form>

    <div id="successMsg" class="message success" role="status">You're on the waitlist!</div>
  </div>

  <script>
    const form = document.getElementById('waitlistForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function clearError() {
      errorMsg.textContent = '';
      errorMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;

      if (!fullName || !email || !role) {
        showError('Please complete all fields.');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const payload = {
        full_name: fullName,
        email: email,
        role: role,
        source: 'TikTok'
      };

      try {
        const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qq1mex27fkhn66', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Request failed');
        }

        form.style.display = 'none';
        successMsg.style.display = 'block';
      } catch (err) {
        showError('Something went wrong. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
