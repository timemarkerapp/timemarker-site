<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access Waitlist</title>
  <style>
    :root {
      --bg1: #0b102a;
      --bg2: #1a1b4b;
      --bg3: #3b1f7a;
      --text: #f5f7ff;
      --muted: #c4c9e3;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.15);
      --accent: #7a5cff;
      --accent2: #a074ff;
      --error: #ff6b6b;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100%;
    }

    body {
      background: radial-gradient(900px 600px at 10% 10%, rgba(122, 92, 255, 0.35), transparent 60%),
                radial-gradient(800px 500px at 90% 90%, rgba(59, 30, 122, 0.45), transparent 60%),
                linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      backdrop-filter: blur(8px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(4, 6, 20, 0.45);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.1;
      letter-spacing: -0.02rem;
    }

    .subtitle {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 20px);
      max-width: 700px;
      line-height: 1.6;
    }

    .form-wrap {
      max-width: 520px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: #e1e5ff;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      background: rgba(11, 15, 40, 0.6);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 92, 255, 0.25);
    }

    button {
      margin-top: 6px;
      padding: 13px 18px;
      border: 0;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      box-shadow: 0 10px 25px rgba(122, 92, 255, 0.35);
      transition: transform 0.08s ease, opacity 0.2es ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    .feedback {
      min-height: 22px;
      font-size: 14px;
      color: var(--error);
      margin-top: 2px;
    }

    .success {
      display: none;
      margin-top: 10px;
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.45);
      color: #b5f1d8;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .container {
        padding: 32px 20px;
        border-radius: 16px;
      }

      .subtitle {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="form-wrap">
      <form id="waitlistForm" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required autocomplete="name" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>

        <button type="submit" id="submitBtn">Join Early Access</button>
        <div class="feedback" id="feedback" aria-live="polite"></div>
      </form>
      <div class="success" id="successMessage">You're on the waitlist!</div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById("waitlistForm");
      const successMessage = document.getElementById("successMessage");
      const feedback = document.getElementById("feedback");
      const submitBtn = document.getElementById("submitBtn");

      const webhookUrl = "https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66";

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        feedback.textContent = "";

        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const role = document.getElementById("role").value;

        if (!fullName || !email || !role) {
          feedback.textContent = "Please complete all fields.";
          return;
        }

        const payload = {
          full_name: fullName,
          email: email,
          role: role,
          source: "TikTok"
        };

        try {
          submitBtn.disabled = true;
          submitBtn.textContent = "Joining...";

          const response = await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }

          form.style.display = "none";
          successMessage.style.display = "block";
        } catch (err) {
          feedback.textContent = "Something went wrong. Please try again.";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Join Early Access";
        }
      });
    })();
  </script>
</body>
</html>
