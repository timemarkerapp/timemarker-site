<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #1c1340;
      --accent1: #6c47ff;
      --accent2: #36c2fb;
      --text: #f5f7ff;
      --muted: #c2c7e6;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.16);
    }

    * {box-sizing: border-box;}

    body {
      margin: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% -10%, rgba(108, 71, 255, 0.4), transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, rgba(54, 194, 251, 0.28), transparent 60%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, #140f30 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1.1fr 1fr ;
      gap: 32px;
      align-items: center;
    }

    .card {
      backdrop-filter: blur(8px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .hero {padding: 40px 36px;}

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08rem;
      text-transform: uppercase;
      color: #e0e4ff;
      background: rgba(108,71,255,0.22);
      border: 1px solid rgba(160,138,255,0.45);
    }

    h1 {
      margin: 16px 0 12px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.02rem;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 20px);
      line-height: 1.6;
    }

    .form-card {
      padding: 28px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 14px;
      color: #e9ecff;
      margin-bottom: 6px;
      display: block;
    }

    .input-wrap {
      display: grid;
      gap: 6px;
    }

    input, select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(11,16,32,0.65);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {color: #99a0c6;}

    input:focus, select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 4px rgba(54,194,251,0.2);
    }

    button {
      margin-top: 6px;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      box-shadow: 0 10px 25px rgba(108,71,255,0.4);
      transition: transform 0.06s ease, opacity 0.2s ease;
    }

    button:hover {opacity: 0.95;}
    button:active {transform: translateY(1px);}
    button:disabled {opacity: 0.7; cursor: not-allowed;}

    .help-text {
      margin-top: 8px;
      font-size: 13px;
      color: #afb6d8;
      min-height: 18px;
    }

    .success {
      display: none;
      text-align: center;
      padding: 32px 20px;
    }

    .success h3 {
      margin: 0;
      font-size: 32px;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr ;
        max-width: 640px;
      }
      .hero {padding: 32px 26px 12px;}
      .form-card {padding: 22px;}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="badge">Time Market</span>
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="card form-card">
      <form id="waitlistForm" novalidate>
        <div class="input-wrap">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Alex Johnson" required />
        </div>
        <div class="input-wrap">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="input-wrap">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <button type="submit" id="submitBtn">Join Early Access</button>
        <div class="help-text" id="feedback" aria-live="polite"></div>
      </form>
      <div class="success" id="successMessage">
        <h3>You're on the waitlist!</h3>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const submitBtn = document.getElementById('submitBtn');
    const feedback = document.getElementById('feedback');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const full_name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;

      if (!full_name || !email || !role) {
        feedback.textContent = 'Please fill out all fields.';
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        feedback.textContent = 'Please enter a valid email address.';
        return;
      }

      feedback.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const payload = {
        full_name,
        email,
        role,
        source: 'TikTok'
      };

      try {
        const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Request failed');
        }

        form.style.display = 'none';
        successMessage.style.display = 'block';
      } catch (error) {
        feedback.textContent = 'Something went wrong. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
