<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market - Early Access</title>
  <style>
    :root {
      --bg1: #0f173a;
      --bg2: #4a1982;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f4f6;
      --muted: #c9d2ff;
      --accent: #8c70ff;
      --accent2: #6366f1;
    }

    * {box-sizing: border-box;}

    body {
      margin: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
      letter-spacing: -0.02tem;
    }

    .hero p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .label {
      font-size: 13px;
      color: #e1e6ff;
      margin-bottom: 6px;
      display: block;
    }

    .input,
    select,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 16px;
    }

    .input,
    select {
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
      outline: none;
    }

    .input::placeholder {color: #b5c0f3;}

    .input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(140, 112, 255, 0.25);
    }

    button {
      padding: 13px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:hover {transform: translateY(-1px);}
    button:disabled {opacity: 0.75; cursor: not-allowed;}

    .success {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.18);
      border: 1px solid rgba(52, 211, 110, 0.45);
      color: #dbffe8;
      font-weight: 600;
      display: none;
    }

    .waitlist-counter {
      margin-top: 14px;
      color: #d6ddff;
      font-size: 14px;
      opacity: 0.95;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #a9b2db;
      text-align: center;
    }

    @media (max-width: 600px) {
      .card {padding: 24px 18px;}
      .hero p {font-size: 16px;}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero">
        <h1>Talk to an expert in 5 minutes</h1>
        <p>Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
      </div>

      <form id="waitlist-form">
        <div>
          <label class="label" for="fullName">Full Name</label>
          <input class="input" id="fullName" name="fullName" type="text" required placeholder="Your name" />
        </div>
        <div>
          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>
        <div>
          <label class="label" for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" selected disabled>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <button id="submitBtn" type="submit">Join Early Access</button>
      </form>

      <div id="successMessage" class="success">You're on the waitlist!</div>
      <div id="waitlist-counter" class="waitlist-counter">Join the waitlist today</div>
      <div class="footer">Time Market • Early Access</div>
    </section>
  </main>

  <script>
    (function() {
      const form = document.getElementById('waitlist-form');
      const submitBtn = document.getElementById('submitBtn');
      const successMessage = document.getElementById('successMessage');
      const counterEl = document.getElementById('waitlist-counter');

      async function loadWaitlistCount() {
        try {
          const res = await fetch('https://opensheet.elk.sh/1gv0sjE-LvMfe7EFdjknDLRPtCQEedVadFRpsz_-o_U/Лист1');
          if (!res.ok) throw new Error('Failed to load counter');
          const data = await res.json();
          const count = Array.isArray(data) ? data.length : 0;
          if (count > 0) {
            counterEl.textContent = `${count} people joined the waitlist`;
          } else {
            counterEl.textContent = 'Join the waitlist today';
          }
        } catch (e) {
          counterEl.textContent = 'Join the waitlist today';
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Joining...';

        const payload = {
          full_name: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim(),
          role: document.getElementById('role').value,
          source: 'TikTok'
        };

        try {
          const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8q+1mex27fkhn66', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error('Submit failed');

          form.style.display = 'none';
          successMessage.style.display = 'block';
        } catch (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
          alert('Something went wrong. Please try again.');
        }
      });

      loadWaitlistCounter();
    })();
  </script>
</body>
</html>
