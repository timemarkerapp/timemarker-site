<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access Waitlist</title>
  <style>
    :root {
      --bg-1: #0b234d;
      --bg-2: #4b2b7f;
      --bg-3: #7d3bc8;
      --card: rgba(13, 17, 34, 0.65);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #eef2ff;
      --muted: #b6c4e4;
      --accent: #9f86ff;
      --accent-2: #78d5ff;
      --success: #6ef3a3;
      --error: #ff8686;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100%;
    }

    body {
      background: radial-gradient(1200px 600px at 10% -10%, rgba(159, 134, 255, 0.35) 0%, transparent 60%),
                radial-gradient(1000px 500px at 100% 0%, rgba(120, 213, 255, 0.25) 0%, transparent 60%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1 1r;
      min-height: 600px;
    }

    .hero,
    .form-wrap {
      padding: 48px;
    }

    header.badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(159, 134, 255, 0.16);
      border: 1px solid rgba(159, 134, 255, 0.45);
      color: #ded5ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1.08;
      margin: 0 0 16px;
      letter-spacing: -0.02eem;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(16px, 2.2vw, 20px);
      line-height: 1.6;
      color: var(--muted);
      max-width: 540px;
    }

    .form-wrap {
      background: rgba(10, 14, 28, 0.65);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
    }

    form {
      width: 100%;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #d7e2ff;
      margin-bottom: 8px;
    }

    input,
    select {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 12px 13px;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input::placeholder {
      color: rgba(182, 196, 228, 0.8);
    }

    input:focus,
    select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(120, 213, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #091b3b;
      background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      margin-top: 4px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(159, 134, 255, 0.4);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      min-height: 20px;
    }

    .msg.error {
      color: var(--error);
    }

    .success {
      display: none;
      width: 100%;
      padding: 20px 18px;
      border-radius: 12px;
      background: rgba(110, 243, 163, 0.12);
      border: 1px solid rgba(110, 243, 163, 0.35);
      color: var(--success);
      font-weight: 600;
      text-align: center;
      font-size: 18px;
    }

    @media (max-width: 880px) {
      .grid {
        grid-template-columns: 1fr ;
      }

      .form-wrap {
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .hero,
      .form-wrap {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="grid">
      <div class="hero">
        <header class="badge">Time Market</header>
        <h1>Talk to an expert in 5 minutes</h1>
        <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
      </div>
      <div class="form-wrap">
        <form id="waitlistForm" novalidate>
          <div class="field">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" placeholder="John Doe" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="" disabled selected>Select your role</option>
              <option value="Client">Client</option>
              <option value="Expert">Expert</option>
            </select>
          </div>
          <button class="btn" type="submit" id="submitBtn">Join Early Access</button>
          <p class="msg" id="formMessage" aria-live="polite"></p>
        </form>
        <div class="success" id="successMessage">You're on the waitlist!</div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById('waitlistForm');
      const submitBtn = document.getElementById('submitBtn');
      const formMessage = document.getElementById('formMessage');
      const successMessage = document.getElementById('successMessage');

      function setError(message) {
        formMessage.textContent = message;
        formMessage.classList.add('error');
      }

      function clearMessage() {
        formMessage.textContent = '';
        formMessage.classList.remove('error');
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearMessage();

        const fullNameEl = document.getElementById('fullName');
        const emailEl = document.getElementById('email');
        const roleEl = document.getElementById('role');

        const full_name = fullNameEl.value.trim();
        const email = emailEl.value.trim();
        const role = roleEl.value;

        if (!full_name || !email || !role) {
          setError('Please fill in all fields.');
          return;
        }

        const emailRegex = /^[^\s]+@[^\s]+\.[^\s]+$/;
        if (!emailRegex.test(email)) {
          setError('Please enter a valid email address.');
          return;
        }

        const payload = {
          full_name,
          email,
          role,
          source: 'TikTok'
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error('Network response was not ok');
          }

          form.style.display = 'none';
          successMessage.style.display = 'block';
        } catch (err) {
          setError('Something went wrong. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
        }
      });
    })();
  </script>
</body>
</html>
