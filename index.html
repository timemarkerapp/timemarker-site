<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market - Early Access</title>
  <style>
    :root {
      --bg1: #0f172e;
      --bg2: #1a1a40;
      --bg3: #6b21a8;
      --text: #f8fafc;
      --muted: #c7d2fe;
      --accent: #a78bfa;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(4, 6, 24, 0.45);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.6;
    }

    .form-title {
      margin: 0 0 18px;
      font-size: 22px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.25);
    }

    button {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #6366f1, #a85cf9);
      cursor: pointer;
      transition: transform 0.06s ease, opacity 0.2s;
    }

    button:active {
      transform: translateY(1px);
    }

    button[disabled] {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .success {
      display: none;
      margin: 0;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.6);
      color: #d1fae5;
      font-weight: 600;
    }

    .error {
      margin-top: 10px;
      color: #fecaca;
      font-size: 14px;
      display: none;
    }

    @media (max-width: 880px) {
      .wrapper {
        grid-template-columns: 1fr;
      }
      .card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="card">
      <h1>Talk to an expert in 5 minutes</h1>
      <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="card">
      <h2 class="form-title">Join the waitlist</h2>
      <form id="waitlistForm">
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" selected disabled>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <button type="submit" id="submitBtn">Join Early Access</button>
        <p class="error" id="errorMsg">Something went wrong. Please try again.</p>
      </form>
      <p class="success" id="successMsg">You're on the waitlist!</p>
    </section>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining...';

      const payload = {
        full_name: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        role: document.getElementById('role').value,
        source: 'TikTok'
      };

      try {
        const res = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qq1mex27fkhhn66', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Request failed');

        form.style.display = 'none';
        successMsg.style.display = 'block';
      } catch (err) {
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
