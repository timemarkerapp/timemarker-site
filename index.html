<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market - Early Access</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(82, 109, 255, 0.35) 0%, rgba(82, 109, 255, 0) 60%),
                    linear-gradient(135deg, #0f172a 0%, #1e1b4c 50%, #2b145c 100%);
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: rgba(10, 15, 30, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1.1 1r 1r;
      gap: 0px;
    }

    .hero,
    .form-section {
      padding: 40px;
    }

    .hero {
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #c7d2fe;
      background: rgba(191, 219, 254, 0.12);
      border: 1px solid rgba(191, 219, 254, 0.25);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(28px, 4vw , 44px);
      line-height: 1.1;
      color: #f8fafc;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      font-size: 17px;
      line-height: 1.6;
      max-width: 540px;
    }

    .form-section {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    form {
      width: 100%;
      max-width: 360px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #d6deeb;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(15, 23, 42, 0.8);
      color: #f8fafc;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:
focus,
    select:focus {
      border-color: #637bff;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }

    button {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #637bff 0%, #8b5cf6 100%);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    button:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .success {
      display: none;
      font-size: 22px;
      font-weight: 600;
      color: #85f1a0;
      text-align: center;
    }

    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #fecaca;
      min-height: 18px;
    }

    @media (max-width: 860px) {
      .wrap {
        grid-template-columns: 1rr;
      }

      .hero {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .hero,
      .form-section {
        padding: 32px 22px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wrap">
      <section class="hero">
        <span class="badge">Time Market</span>
        <h1>Talk to an expert in 5 minutes</h1>
        <p>Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
      </section>

      <section class="form-section">
        <div style="width:100%; max-width:360px;">
          <form id="waitlistForm">
            <div class="field">
              <label for="fullName">Full Name</label>
              <input id="fullName" name="fullName" type="text" required placeholder="Alex Johnson" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required placeholder="you@example.com" />
            </div>
            <div class="field">
              <label for="role">Role</label>
              <select id="role" name="role" required>
                <option value="" disabled selected>Select your role</option>
                <option value="Client">Client</option>
                <option value="Expert">Expert</option>
              </select>
            </div>
            <button id="submitBtn" type="submit">Join Early Access</button>
            <div class="error" id="errorMsg"></div>
          </form>
          <div class="success" id="successMsg">You're on the waitlist!</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById("waitlistForm");
      const successMsg = document.getElementById("successMsg");
      const errorMsg = document.getElementById("errorMsg");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorMsg.textContent = "";

        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const role = document.getElementById("role").value;

        if (!fullName || !email || !role) {
          errorMsg.textContent = "Please fill in all fields.";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        const payload = {
          full_name: fullName,
          email: email,
          role: role,
          source: "TikTok"
        };

        try {
          const response = await fetch("https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Network response was not ok");
          }

          form.style.display = "none";
          successMsg.style.display = "block";
        } catch (err) {
          errorMsg.textContent = "Something went wrong. Please try again.";
          submitBtn.disabled = false;
          submitBtn.textContent = "Join Early Access";
        }
      });
    })();
  </script>
</body>
</html>
