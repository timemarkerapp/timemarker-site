<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102d;
      --bg2: #1d124c;
      --bg3: #30166b;
      --card: rgba(14, 17, 40, 0.75);
      --border: rgba(150, 130, 255, 0.25);
      --text: #f5f7ff;
      --muted: #c4caf2;
      --accent: #7a5cf6;
      --accent2: #b090ff;
      -inputBg: rgba(255, 255, 255, 0.08);
      --inputBd: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100%;
    }

    body {
      background: radial-gradient(1200px 600px at 10% -10%, #3b2280, transparent 60%),
                radial-gradient(900px 500px at 90% 100%, #321970, transparent 55%),
                linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1.1 1r;
      gap: 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    .hero h1 {
      font-size: clamp(28px, 4vw , 50px);
      line-height: 1.10;
      margin: 0 0 16px;
      letter-spacing: -0.02rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 19px);
      line-height: 1.6;
      max-width: 440px;
    }

    .form-card {
      background: rgba(7, 10, 28, 0.75);
      border: 1px solid rgba(182, 169, 255, 0.25);
      border-radius: 16px;
      padding: 20px;
    }

    .form-title {
      font-size: 18px;
      font-weight: 650;
      margin: 0 0 16px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 13px;
      color: #d0d6ff;
      margin-bottom: 6px;
      display: block;
    }

    .field {
      display: block;
    }

    input, select {
      width: 100%;
      appearance: none;
      border: 1px solid var(--inputBd);
      background: var(--inputBg);
      color: var(--text);
      font-size: 15px;
      padding: 12px 13px;
      border-radius: 10px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 92, 246, 0.25);
    }

    .btn {
      border: 0;
      cursor: pointer;
      padding: 13px 16px;
      border-radius: 10px;
      font-weight: 650;
      font-size: 15px;
      color: white;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: transform 0.08c ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[disabled] {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .success {
      display: none;
      margin-top: 4px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(123, 255, 176, 0.45);
      background: rgba(63, 161, 103, 0.2);
      color: #cfffe5;
      font-weight: 600;
    }

    .error {
      display: none;
      margin-top: 8px;
      color: #ffc4c4;
      font-size: 13px;
    }

    @media (max-width: 880px) {
      .wrapper {
        grid-template-columns: 1rr;
        gap: 24px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="hero">
      <h1>Talk to an expert in 5 minutes</h1>
      <p>Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="form-card">
      <p class="form-title">Join the waitlist</p>
      <form id="waitlistForm">
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required placeholder="Alex Johnson" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" selected disabled>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>

        <button class="btn" type="submit" id="submitBtn">Join Early Access</button>
      </form>

      <div id="successMsg" class="success" aria-live="polite">You're on the waitlist!</div>
      <div id="errorMsg" class="error" aria-live="polite">Something went wrong. Please try again.</div>
    </section>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;

      if (!fullName || !email || !role) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining...';

      try {
        const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            full_name: fullName,
            email: email,
            role: role,
            source: 'TikTok'
          })
        });

        if (!response.ok) throw new Error('Request failed');

        form.style.display = 'none';
        successMsg.style.display = 'block';
      } catch (err) {
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
