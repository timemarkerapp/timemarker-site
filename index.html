<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market - Early Access</title>
  <style>
    :root {
      --bg1: #0f1741;
      --bg2: #2d1a62;
      --bg3: #133b7a;
      --text: #edefff;
      --muted: #b8c0f2;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --accent: #7c3fff;
      --accent-2: #a85fff;
      --error: #ff6691;
      --success: #65e98b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% 10%, rgba(124, 63, 255, 0.35), #0000),
                radial-gradient(1000px 600px at 90% 90%, rgba(51, 133, 255, 0.25), #0000),
                linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1.2 fr 1fr;
      min-height: 560px;
    }

    .hero,
    .form-section {
      padding: 48px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
    }

    .badge {
      align-self: flex-start;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06rem;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 50px);
      line-height: 1.08;
      margin: 0 0 18px;
      letter-spacing: -0.02rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .form-section {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: 100%;
      max-width: 360px;
    }

    .form-card h2 {
      margin: 0 0 18px;
      font-size: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input,
    select,
    .btn {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
      padding: 12px 13px;
      outline: none;
    }

    input,
    select {
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
    }

    input::placeholder {
      color: #9ba7d6;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 63, 255, 0.25);
    }

    .btn {
      margin-top: 6px;
      cursor: pointer;
      border: none;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      transition: transform 0.08s ease, filter 0.2s ease;
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 20px;
      margin-top: 10px;
      font-size: 14px;
    }

    .status.error {
      color: var(--error);
    }

    .success {
      display: none;
      text-align: center;
      padding: 22px 18px;
      border: 1px solid rgba(101, 233, 139, 0.45);
      background: rgba(101, 233, 139, 0.12);
      border-radius: 14px;
      color: var(--success);
      font-weight: 600;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .hero,
      .form-section {
        padding: 32px 24px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="wrap">
      <section class="hero">
        <div class="badge">Time Market</div>
        <h1>Talk to an expert in 5 minutes</h1>
        <p>Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
      </section>
      <section class="form-section">
        <div class="form-card">
          <h2>Join the waitlist</h2>
          <form id="waitlistForm" novalidate>
            <div class="field">
              <label for="fullName">Full Name</label>
              <input id="fullName" name="fullName" type="text" required placeholder="Alex Johnson" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required placeholder="you@example.com" />
            </div>
            <div class="field">
              <label for="role">Role</label>
              <select id="role" name="role" required>
                <option value="" selected disabled>Select your role</option>
                <option value="Client">Client</option>
                <option value="Expert">Expert</option>
              </select>
            </div>
            <button id="submitBtn" class="btn" type="submit">Join Early Access</button>
            <div id="status" class="status" aria-live="polite"></div>
          </form>
          <div id="success" class="success">You're on the waitlist!</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const form = document.getElementById("waitlistForm");
      const success = document.getElementById("success");
      const status = document.getElementById("status");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        status.textContent = "";
        status.className = "status";

        if (!form.reportValidity()) return;

        const payload = {
          full_name: document.getElementById("fullName").value.trim(),
          email: document.getElementById("email").value.trim(),
          role: document.getElementById("role").value,
          source: "TikTok"
        };

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        try {
          const res = await fetch("https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!res.ok) throw new Error("Request failed");

          form.style.display = "none";
          success.style.display = "block";
        } catch (err) {
          status.textContent = "Something went wrong. Please try again.";
          status.className = "status error";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Join Early Access";
        }
      });
    })();
  </script>
</body>
</html>
