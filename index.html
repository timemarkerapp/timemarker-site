<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Waitlist</title>
  <style>
    :root {
      --bg-1: #0b0e1a;
      --bg-2: #121830;
      --bg-3: #1a132c;
      --card: rgba(255, 255, 255, 0.07);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f5f7ff;
      --muted: #cacfed;
      --accent: #6ca6ff;
      --accent-2: #8b5fff;
      --success: #32d696;
      --radius: 18px;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% -10%, #1e2f60, transparent 60%),
                radial-gradient(1000px 600px at 100% 0%, #221544, transparent 55%),
                linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 40%, var(--bg-3) 100%);
      min-height: 100%;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    header {
      padding: 28px 0 16px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.3px;
      font-size: 1.05rem;
      opacity: 0.96;
    }

    .nav .small {
      color: var(--muted);
      font-size: 0.93rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 44px 0 32px;
      text-align: center;
    }

    .hero .card {
      padding: 56px 26px;
    }

    h1 {
      margin: 0 auto 10px;
      font-size: clamp(2.1rem, 4.6vw, 4rem);
      line-height: 1.07;
      letter-spacing: -0.02rem;
      max-width: 800px;
    }

    .subhead {
      margin: 0  auto 26px;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      max-width: 720px;
      line-height: 1.6;
    }

    .btn {
      appearance: none;
      border: 0;
      cursor: pointer;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 20px rgba(108, 127, 255, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(108, 127, 255, 0.5);
    }

    section {
      padding: 20px 0 10px;
    }

    .section-title {
      font-size: clamp(1.4rem, 3vw, 2.1rem);
      margin: 0 0 12px;
    }

    .section-subtext {
      color: var(--muted);
      margin: 0 0 22px;
      line-height: 1.6;
      max-width: 78ch;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .pad {
      padding: 20px;
    }

    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.85rem;
      background: rgba(108, 166, 255, 0.25);
      color: #c3d9ff;
      border: 1px solid rgba(190, 212, 255, 0.4);
      flex-shrink: 0;
    }

    .example-title {
      margin: 0 0 6px;
      font-size: 1.06rem;
    }

    .example-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-wrap {
      margin: 24px 0 60px;
    }

    form {
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 0.92rem;
      color: #d9dfff;
      margin-top: 6px;
    }

    input, select {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: white;
      padding: 12px 12px;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
    }

    input::placeholder {
      color: #a6adc6;
    }

    input:focus, select:focus {
      border-color: rgba(130, 167, 255, 0.8);
      box-shadow: 0 0 0 3px rgba(108, 166, 255, 0.25);
    }

    .success {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(50, 214, 150, 0.12);
      border: 1px solid rgba(50, 214, 150, 0.45);
      color: #a7f3cf;
      font-weight: 600;
    }

    footer {
      padding: 10px 0 30px;
      color: #b2d7f9;
      font-size: 0.89rem;
      text-align: center;
      opacity: 0.8;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .hero .card {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">Time Market</div>
      <div class="small">Early Access Waitlist</div>
    </div>
