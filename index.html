<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102a;
      --bg2: #1a104f;
      --accent: #7a5cff;
      --accent2: #c07bff;
      --text: #eff1ff;
      --muted: #b7bcdd;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --success: #36d499;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(122, 92, 255, 0.25) 0%, rgba(122, 92, 255, 0) 60%),
        radial-gradient(1000px 500px at 90% 90%, rgba(192, 123, 255, 0.2) %, rgba(192, 123, 255, 0) 60%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .hero h1 {
      font-size: clamp(2.2, 5vw, 3.6rem);
      line-height: 1.08;
      margin: 0 0 16px;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(122, 92, 255, 0.22);
      color: #dedbff;
      border: 1px solid rgba(122, 92, 255, 0.35);
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      color: #d6d9f6;
    }

    input,
    select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(12, 16, 42, 0.75);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 92, 255, 0.25);
      background: rgba(15, 20, 52, 0.9);
    }

    .btn {
      margin-top: 4px;
      padding: 13px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(95deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 25px rgba(122, 92, 255, 0.35);
      transition: transform 0.07s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #formMessage {
      min-height: 20px;
      font-size: 0.92rem;
      color: #ffb4b4;
    }

    .success {
      display: none;
      text-align: center;
      padding: 24px 14px 4px;
    }

    .success .success-dot {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      margin: 0  0px 12px;
      background: rgba(54, 212, 153, 0.18);
      border: 1px solid rgba(54, 212, 153, 0.40);
      display: grid;
      place-items: center;
      color: var(--success);
      font-size: 1.6rem;
    }

    .success p {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #d8ffed;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 28px 20px;
      }

      .hero h1 {
        font-size: clamp(1.9, 9vw, 2.8rem);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel hero">
      <span class="badge">Time Market • Early Access</span>
      <h1>Talk to an expert in 5 minutes</h1>
      <p>Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="panel">
      <form id="waitlistForm" novalidate>
        <div class="field">
          <label for="full_name">Full Name</label>
          <input id="full_name" name="full_name" type="text" placeholder="Jane Doe" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>

        <button id="submitBtn" class="btn" type="submit">Join Early Access</button>
        <div id="formMessage" aria-live="polite"></div>
      </form>

      <div id="successMessage" class="success" role="status" aria-live="polite">
        <div class="success-dot">✓</div>
        <p>You're on the waitlist!</p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('waitlistForm');
    const successMessage = document.getElementById('successMessage');
    const formMessage = document.getElementById('formMessage');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formMessage.textContent = '';

      if (!form.reportValidity()) return;

      const fullName = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;

      const payload = {
        full_name: fullName,
        email: email,
        role: role,
        source: 'TikTok'
      };

      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining...';

      try {
        const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Failed to submit');
        }

        form.style.display = 'none';
        successMessage.style.display = 'block';
      } catch (err) {
        formMessage.textContent = 'Something went wrong. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Early Access';
      }
    });
  </script>
</body>
</html>
