<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market - Early Access</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      color: #f3f4f6;
      background: linear-gradient(135deg, #070b34 0%, #1a124e 40%, #2d1a6a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: rgba(15, 23, 64, 0.55);
      border: 1px solid rgba(148, 163, 255, 0.2);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      padding: 40px;
    }

    .hero {
      margin-bottom: 32px;
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 50px);
      line-height: 1.15;
      letter-spacing: -0.03rem;
      margin-bottom: 14px;
    }

    .hero p {
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 1.6;
      color: #cbd5e1;
      max-width: 70ch;
    }

    .form-card {
      background: rgba(10, 14, 40, 0.65);
      border: 1px solid rgba(148, 163, 255, 0.25);
      border-radius: 16px;
      padding: 24px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: #dfe7ff;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      color: #f8fafc;
      background: rgba(25, 33, 72, 0.9);
      border: 1px solid rgba(148, 163, 255, 0.3);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus,
    select:focus {
      border-color: #8c7cff;
      box-shadow: 0 0 0 3px rgba(140, 124, 255, 0.25);
    }

    button {
      margin-top: 6px;
      background: linear-gradient(135deg, #7c3iff 0%, #a5b4fc 100%);
      color: #0f172a;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    #feedback {
      margin-top: 12px;
      font-size: 14px;
      color: #fca5a5;
      min-height: 20px;
    }

    #success {
      display: none;
      margin-top: 10px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.45);
      color: #85efac;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 22px;
        border-radius: 16px;
      }

      .form-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Talk to an expert in 5 minutes</h1>
      <p>Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    </section>

    <section class="form-card">
      <form id="waitlistForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" required placeholder="Jane Doe" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="Client">Client</option>
            <option value="Expert">Expert</option>
          </select>
        </div>

        <button type="submit" id="submitBtn">Join Early Access</button>
        <div id="feedback" aria-live="polite"></div>
      </form>
      <div id="success">You're on the waitlist!</div>
    </section>
  </div>

  <script>
    (function () {
      const form = document.getElementById("waitlistForm");
      const submitBtn = document.getElementById("submitBtn");
      const feedback = document.getElementById("feedback");
      const success = document.getElementById("success");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        feedback.textContent = "";

        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const role = document.getElementById("role").value;

        if (!fullName || !email || !role) {
          feedback.textContent = "Please complete all fields.";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Joining...";

        const payload = {
          full_name: fullName,
          email: email,
          role: role,
          source: "TikTok"
        };

        try {
          const response = await fetch("https://hook.us2.make.com/yn1wz8ymu4qct6cue8qq1mex27fkhn66", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }

          form.style.display = "none";
          success.style.display = "block";
        } catch (err) {
          feedback.textContent = "Something went wrong. Please try again.";
          submitBtn.disabled = false;
          submitBtn.textContent = "Join Early Access";
        }
      });
    })();
  </script>
</body>
</html>
