<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102f;
      --bg2: #1a123f;
      --bg3: #3d2082;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f5f7ff;
      --muted: #ccd3f9;
      --accent: #7d70ff;
      --accent2: #59b3ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, System-UI, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
    }

    body {
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% 0%, rgba(89, 70, 255, 0.35), transparent 60%),
                    radial-gradient(1000px 500px at 90% 100%, rgba(44, 134, 255, 0.25), transparent 60%),
                    linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #e8ebff;
      background: rgba(125, 112, 255, 0.18);
      border: 1px solid rgba(155, 151, 255, 0.35);
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      margin: 0 0 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 0 24px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: #dee4ff;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.10);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input::placeholder {
      color: rgba(245, 247, 255, 0.65);
    }

    input:focus, select:focus {
      border-color: rgba(125, 112, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(125, 112, 255, 0.25);
      background: rgba(255, 255, 255, 0.14);
    }

    button {
      margin-top: 4px;
      padding: 13px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #waitlist-counter {
      margin-top: 12px;
      font-size: 14px;
      color: #d7dfff;
      text-align: center;
      background: rgba(125, 112, 255, 0.16);
      border: 1px solid rgba(155, 151, 255, 0.35);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #success-message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      color: #e6fff1;
      background: rgba(46, 204, 113, 0.16);
      border: 1px solid rgba(74, 230, 139, 0.35);
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
        border-radius: 16px;
      }
      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Time Market — Early Access</div>
    <h1>Talk to an expert in 5 minutes</h1>
    <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>
    
    <form id="waitlist-form">
      <div class="field">
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" type="text" required placeholder="Alex Johnson" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="" disabled selected>Select your role</option>
          <option value="Client">Client</option>
          <option value="Expert">Expert</option>
        </select>
      </div>
      <button type="submit" id="submit-btn">Join Early Access</button>
      <div id="waitlist-counter" aria-live="polite">Join the waitlist today</div>
    </form>

    <div id="success-message">You're on the waitlist!</div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('waitlist-form');
      const successMessage = document.getElementById('success-message');
      const submitBtn = document.getElementById('submit-btn');
      const counterEl = document.getElementById('waitlist-counter');

      async function loadWaitlistCount() {
        try {
          const res = await fetch('https://opensheet.elk.sh/1gv0sjE-LvMfe7EFdjknDLRPtCQEedVadFRpsz_-o_U/Лист1', {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
          });
          if (!res.ok) throw new Error('Failed to load counter');
          const data = await res.json();
          const count = Array.isArray(data) ? data.length : 0;
          counterEl.textContent = `${count} people joined the waitlist`;
        } catch (e) {
          counterEl.textContent = 'Join the waitlist today';
        }
      }

      loadWaitlistCount();

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const role = document.getElementById('role').value;

        if (!fullName || !email || !role) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Joining...';

        try {
          const response = await fetch('https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhh66', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              full_name: fullName,
              email: email,
              role: role,
              source: 'TikTok'
            })
          });

          if (!response.ok) throw new Error('Submission failed');

          form.style.display = 'none';
          successMessage.style.display = 'block';
        } catch (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
          alert('Something went wrong. Please try again.');
        }
      });
    })();
  </script>
</body>
</html>
