<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Waitlist</title>
  <style>
    :root {
      --bg-1: #0b102c;
      --bg-2: #161a42;
      --bg-3: #2a154f;
      --card: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.2);
      --text: #eff2ff;
      --muted: #bcc2ff;
      --accent: #8b5cff;
      --accent-2: #0080ff;
      --success: #3ed5a0;
      --error: #ff6984;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      line-height: 1.6;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(139, 92, 246, 0.25), transparent 60%),
                    linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, 92%m);
      margin: 0 auto;
      padding: 32px 0 60px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.8);
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }

    .hero {
      margin-top: 20px;
      padding: 40px 28px;
      display: grid;
      gap: 22px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(1.9rem, 5vw + 0.5rem, 3.6rem);
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .hero p {
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      max-width: 720px;
      margin: 0 auto;
    }

    .cta-btn {
      justify-self: center;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 25px rgba(64, 136, 255, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(64, 136, 255, 0.45);
    }

    .section {
      margin-top: 22px;
      padding: 28px 24px;
    }

    .section h2 {
      font-size: clamp(1.3rem, 2.8vw, 1.9rem);
      margin-bottom: 8px;
    }

    .section p {
      color: var(--muted);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .step {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .step span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.25);
      border: 1px solid rgba(139, 92, 246, 0.55);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .examples-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .example-card {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .example-card h3 {
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .example-card p {
      color: #d9dfff;
      font-size: 0.98rem;
    }

    .form-wrap {
      margin-top: 22px;
      padding: 24px;
    }

    .form-wrap h2 {
      margin-bottom: 6px;
    }

    .form-group {
      margin-top: 14px;
    }

    label {
      display: block;
      font-size: 0.94rem;
      margin-bottom: 6px;
      color: #e3e8ff;
    }

    input, select {
      width: 100%;
      padding: 12px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(10, 14, 40, 0.65);
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #a9b2e6;
    }

    .form-btn {
      margin-top: 16px;
      width: 100%;
      border: none;
      padding: 13px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .form-btn[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #message {
      margin-top: 12px;
      font-size: 0.94em;
    }

    .success {
      color
