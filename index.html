<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Market – Early Access</title>
  <style>
    :root {
      --bg1: #0b102a;
      --bg2: #1f1347;
      --bg3: #452786;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f4ff;
      --muted: #cbceff;
      --accent: #7a5cff;
      --accent2: #a070ff;
      --error: #ff7b9a;
      --success: #85f3b1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
    }

    .backdrop {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #e9e4ff;
      background: rgba(160, 112, 255, 0.25);
      border: 1px solid rgba(160, 112, 255, 0.45);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw , 46px);
      line-height: 1.15;
      letter-spacing: -0.02rem;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 19px);
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: #ded1ff;
      font-weight: 600;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(11, 16, 42, 0.65);
      color: var(--text);
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.06s ease;
    }

    input::placeholder { color: #a8abd4; }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(122, 92, 255, 0.25);
    }

    .btn {
      margin-top: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .message {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    .error { color: var(--error); }

    .success-view {
      display: none;
      margin-top: 6px;
      padding: 18px 16px;
      border-radius: 12px;
      background: rgba(133, 243, 177, 0.12);
      border: 1px solid rgba(133, 243, 177, 0.45);
      color: var(--success);
      font-weight: 700;
      text-align: center;
      font-size: 20px;
    }

    @media (max-width: 600px) {
      .card { padding: 22px; border-radius: 16px; }
      .backdrop { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="backdrop">
    <div class="container">
      <section class="card">
        <span class="badge">Time Market</span>
        <h1>Talk to an expert in 5 minutes</h1>
        <p class="subtitle">Join the early access waitlist for the app where you can instantly talk to professionals and pay only for the time you use.</p>

        <form id="waitlistForm" novalidate>
          <div class="field">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" placeholder="John Doe" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="" selected disabled>Select your role</option>
              <option value="Client">Client</option>
              <option value="Expert">Expert</option>
            </select>
          </div>
          <button class="btn" id="submitBtn" type="submit">Join Early Access</button>
          <p id="formMessage" class="message" aria-live="polite"></p>
        </form>

        <div id="successView" class="success-view">Ou're on the waitlist!</div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('waitlistForm');
      const fullNameInput = document.getElementById('fullName');
      const emailInput = document.getElementById('email');
      const roleInput = document.getElementById('role');
      const submitBtn = document.getElementById('submitBtn');
      const formMessage = document.getElementById('formMessage');
      const successView = document.getElementById('successView');
      const webhookURL = 'https://hook.us2.make.com/yn1wz8ymu4qct6cue8qk1mex27fkhn66';

      function setMessage(text, isError) {
        formMessage.textContent = text || '';
        formMessage.classList.toggle('error', !!isError);
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).toLowerCase());
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        setMessage('', false);

        const fullName = fullNameInput.value.trim();
        const email = emailInput.value.trim();
        const role = roleInput.value;

        if (!fullName || !email || !role) {
          setMessage('Please complete all fields.', true);
          return;
        }

        if (!isValidEmail(email)) {
          setMessage('Please enter a valid email address.', true);
          return;
        }

        const payload = {
          full_name: fullName,
          email: email,
          role: role,
          source: 'TikTok'
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const response = await fetch(webhookURL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error('Request failed');
          }

          form.style.display = 'none';
          successView.style.display = 'block';
        } catch (err) {
          setMessage('Something went wrong. Please try again.', true);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Join Early Access';
        }
      });
    })();
  </script>
</body>
</html>
